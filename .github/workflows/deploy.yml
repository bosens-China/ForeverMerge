name: Deploy to DogeCloud OSS

on:
  push:
    branches:
      - main # 当推送到 main 分支时触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # v6+ 使用 node24，避免 Node 20 弃用告警
        uses: actions/checkout@v6

      - name: Setup Node.js
        # v6+ 使用 node24；项目构建仍使用下方指定的 Node 22
        # cache: pnpm 缓存 pnpm store，与用 Corepack 还是 action-setup 装 pnpm 无关
        uses: actions/setup-node@v6
        with:
          node-version: "22" # Astro 要求的 Node 版本
          cache: "pnpm"

      - name: Setup pnpm via Corepack
        # 避免 pnpm/action-setup（当前 release 仍为 node20）触发弃用提示
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Install dependencies
        run: pnpm install

      - name: Build Astro site
        run: pnpm run build

      # 1. 生成多吉云 API 的 AccessToken
      - name: Generate DogeCloud Token
        id: doge_token
        # v8 起基于 Node 24，消除 Node 20 弃用告警
        uses: actions/github-script@v8
        env:
          DOGE_ACCESS_KEY: ${{ secrets.DOGE_ACCESS_KEY }}
          DOGE_SECRET_KEY: ${{ secrets.DOGE_SECRET_KEY }}
        with:
          script: |
            const crypto = require('crypto');
            const accessKey = process.env.DOGE_ACCESS_KEY;
            const secretKey = process.env.DOGE_SECRET_KEY;

            // 多吉云获取临时密钥的 API 路径
            const apiPath = '/auth/tmp_token.json';

            // 请求体：请求 OSS_FULL (完全控制) 权限，范围为整个存储空间
            const body = JSON.stringify({
              channel: 'OSS_FULL',
              scopes: ['*']
            });

            // 签名算法：HMAC-SHA1(apiPath + \n + body)
            const signStr = apiPath + '\n' + body;
            const sign = crypto.createHmac('sha1', secretKey).update(Buffer.from(signStr, 'utf8')).digest('hex');
            const authorization = 'TOKEN ' + accessKey + ':' + sign;

            // 将生成的 Authorization 头和 Body 传递给下一步
            core.setOutput('authorization', authorization);
            core.setOutput('body', body);

      # 2. 调用多吉云 API 获取临时密钥 (STS) 和 s3Endpoint
      - name: Get Temporary Credentials
        id: get_sts
        env:
          DOGE_BUCKET_NAME: ${{ secrets.DOGE_BUCKET_NAME }}
        run: |
          RESPONSE=$(curl -s -X POST "https://api.dogecloud.com/auth/tmp_token.json" \
            -H "Content-Type: application/json" \
            -H "Authorization: ${{ steps.doge_token.outputs.authorization }}" \
            -d '${{ steps.doge_token.outputs.body }}')

          # 检查 API 是否返回 200
          CODE=$(echo $RESPONSE | jq -r '.code')
          if [ "$CODE" != "200" ]; then
            echo "API Error: $(echo $RESPONSE | jq -r '.msg')"
            exit 1
          fi

          # 提取临时密钥
          echo "AWS_ACCESS_KEY_ID=$(echo $RESPONSE | jq -r '.data.Credentials.accessKeyId')" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(echo $RESPONSE | jq -r '.data.Credentials.secretAccessKey')" >> $GITHUB_ENV
          echo "AWS_SESSION_TOKEN=$(echo $RESPONSE | jq -r '.data.Credentials.sessionToken')" >> $GITHUB_ENV

          # 提取 s3Endpoint 和 s3Bucket
          # 如果配置了 DOGE_BUCKET_NAME (例如 'blog')，则在返回的 Buckets 数组中匹配对应的 name
          # 否则默认使用数组中的第一个 Bucket
          if [ -n "$DOGE_BUCKET_NAME" ]; then
            echo "Looking for bucket with name: $DOGE_BUCKET_NAME"
            BUCKET_JSON=$(echo $RESPONSE | jq -c ".data.Buckets[] | select(.name == \"$DOGE_BUCKET_NAME\")")
            if [ -z "$BUCKET_JSON" ]; then
              echo "Error: Could not find bucket '$DOGE_BUCKET_NAME' in the API response."
              exit 1
            fi
            echo "S3_ENDPOINT=$(echo $BUCKET_JSON | jq -r '.s3Endpoint')" >> $GITHUB_ENV
            echo "S3_BUCKET=$(echo $BUCKET_JSON | jq -r '.s3Bucket')" >> $GITHUB_ENV
          else
            echo "S3_ENDPOINT=$(echo $RESPONSE | jq -r '.data.Buckets[0].s3Endpoint')" >> $GITHUB_ENV
            echo "S3_BUCKET=$(echo $RESPONSE | jq -r '.data.Buckets[0].s3Bucket')" >> $GITHUB_ENV
          fi

      # 3. 使用 AWS CLI 同步 dist 文件夹到多吉云
      - name: Deploy to DogeCloud S3
        env:
          AWS_DEFAULT_REGION: automatic
        run: |
          # 完全依赖 API 返回的 s3Bucket 和 s3Endpoint，这是最安全和推荐的做法
          TARGET_BUCKET="$S3_BUCKET"
          TARGET_ENDPOINT="$S3_ENDPOINT"
          
          # 确保 endpoint 包含 https:// 前缀
          if [[ ! "$TARGET_ENDPOINT" == http* ]]; then
            TARGET_ENDPOINT="https://$TARGET_ENDPOINT"
          fi

          echo "Deploying to bucket: $TARGET_BUCKET at endpoint: $TARGET_ENDPOINT"

          # 腾讯云 COS 强制要求使用虚拟托管样式的域名 (Virtual Hosted-Style)
          # 我们需要配置 AWS CLI 强制使用此模式，而不是路径模式
          aws configure set default.s3.addressing_style virtual

          aws s3 sync ./dist s3://$TARGET_BUCKET/ \
            --endpoint-url $TARGET_ENDPOINT \
            --delete \
            --acl public-read
